# ★重要★ このワークフローは dev.nubow.co.jp にのみデプロイします
# ローカル(nubow_0730)の内容を、サーバーの wp-content/themes/nubow/ にアップロード
# ※サーバー側の nubow_0730 は古いため使用しない。有効テーマは nubow です

name: Deploy to dev.nubow.co.jp

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!.github/**'
  workflow_dispatch:  # 手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy to dev.nubow.co.jp only
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: dev.nubow.co.jp
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: wp-content/themes/nubow/
          exclude: |
            **/.git*
            **/.DS_Store
            **/node_modules/**
            **/README*
            **/sync_fix*
            **/.cursor*
